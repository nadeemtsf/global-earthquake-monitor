version: "3.8"

# ---------------------------------------------------------------------------
# Global Earthquake Monitor — docker-compose
#
# Services:
#   backend  — FastAPI (uvicorn) at http://localhost:8000
#   frontend — Vite dev server at http://localhost:5173 (dev only)
#
# Usage:
#   cp backend/.env.example backend/.env   # fill in API keys
#   docker compose up --build
# ---------------------------------------------------------------------------

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    volumes:
      - backend_cache:/app/.cache
    env_file:
      - ./backend/.env
    environment:
      - ENV=production
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Frontend (Vite dev server — for local full-stack development only)
  # In production the frontend is deployed as a static bundle (see issue #57).
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    profiles:
      - dev

volumes:
  backend_cache:

networks:
  default:
    name: earthquake-monitor-network
